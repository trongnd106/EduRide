version: '3.8'

services:
  php:
    image: ${DOCKERHUB_USERNAME}/hust-backend:latest
    container_name: hust_prod_php
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
    volumes:
      - app_storage:/var/www/storage
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - db
      - redis
    networks:
      - hust_net

  db:
    image: mysql:8.0.30
    container_name: hust_prod_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hust_net

  redis:
    image: redis:alpine
    container_name: hust_prod_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hust_net

  adminer:
    image: adminer
    container_name: hust_prod_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8001}:8080"
    networks:
      - hust_net

networks:
  hust_net:
    driver: bridge

volumes:
  app_storage:
  mysql_data:
  redis_data:

